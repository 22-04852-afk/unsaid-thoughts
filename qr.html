<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsaid Thoughts QR Code</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --chrome-1: #f6f8ff;
            --chrome-2: #dddffc;
            --chrome-3: #f8cbef;
            --ink: #21142f;
            --brand: #d72f8f;
            --brand-strong: #b71f75;
            --line: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Space Grotesk', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 14% 22%, rgba(238, 222, 255, 0.84) 0%, rgba(238, 222, 255, 0) 34%),
                radial-gradient(circle at 89% 78%, rgba(255, 176, 227, 0.62) 0%, rgba(255, 176, 227, 0) 30%),
                linear-gradient(145deg, #eef2ff 0%, #f6d8f4 50%, #ffd6ea 100%);
            padding: 1rem;
            overflow: hidden;
        }

        .ring {
            position: fixed;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 0 0 8px rgba(255, 255, 255, 0.22);
            opacity: 0.8;
            pointer-events: none;
            animation: drift 17s ease-in-out infinite;
        }

        .ring.one {
            width: 220px;
            height: 220px;
            top: -52px;
            left: -44px;
        }

        .ring.two {
            width: 270px;
            height: 270px;
            bottom: -84px;
            right: -70px;
            animation-delay: -5s;
        }

        .card {
            position: relative;
            width: min(95vw, 600px);
            background:
                linear-gradient(140deg, rgba(255, 255, 255, 0.88) 0%, rgba(245, 240, 255, 0.9) 42%, rgba(255, 226, 244, 0.86) 100%);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow:
                0 20px 40px rgba(80, 44, 130, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(7px);
            padding: 1.3rem 1.3rem 1.8rem;
            text-align: center;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
            background-size: 22px 22px;
            pointer-events: none;
        }

        h1 {
            position: relative;
            z-index: 1;
            margin: 0.1rem 0 0.35rem;
            font-family: 'Audiowide', 'Space Grotesk', sans-serif;
            font-size: clamp(1.45rem, 5vw, 1.95rem);
            line-height: 1.15;
            color: #5f2a8f;
            text-shadow: 0 2px 0 rgba(255, 255, 255, 0.86);
        }

        p {
            position: relative;
            z-index: 1;
            margin: 0.25rem auto 1rem;
            max-width: 40ch;
            color: #5b3f78;
            font-size: 0.94rem;
        }

        .qr-wrap {
            position: relative;
            z-index: 1;
            display: inline-block;
            border-radius: 18px;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--chrome-1) 0%, var(--chrome-2) 60%, var(--chrome-3) 100%);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.92),
                0 12px 22px rgba(102, 52, 154, 0.2);
        }

        img {
            width: min(74vw, 340px);
            height: auto;
            display: block;
            border-radius: 10px;
            background: #fff;
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .url {
            position: relative;
            z-index: 1;
            margin-top: 0.9rem;
            color: #633a85;
            word-break: break-all;
            font-size: 0.88rem;
            font-weight: 700;
        }

        .btn {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            padding: 0.72rem 1.1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 0.2px;
            color: #fff;
            background: linear-gradient(135deg, #8d43d2 0%, var(--brand) 60%, var(--brand-strong) 100%);
            box-shadow: 0 12px 20px rgba(114, 36, 148, 0.34);
            border: 0;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 24px rgba(171, 22, 104, 0.33);
            filter: saturate(1.06);
        }

        .symbols {
            position: relative;
            z-index: 1;
            margin-bottom: 0.55rem;
            font-size: 1rem;
            letter-spacing: 0.35rem;
            color: #a45fc9;
        }

        .cutesy-ribbon {
            position: relative;
            z-index: 1;
            margin: 0.15rem auto 0.55rem;
            font-size: 0.86rem;
            letter-spacing: 0.22rem;
            color: #c14ca2;
            opacity: 0.92;
            white-space: nowrap;
        }

        .sticker {
            position: absolute;
            z-index: 1;
            font-size: 1.25rem;
            line-height: 1;
            text-shadow: 0 4px 10px rgba(120, 51, 155, 0.2);
            user-select: none;
            pointer-events: none;
            animation: bob 3.8s ease-in-out infinite;
        }

        .sticker.s1 { top: 16px; left: 20px; color: #cb56ad; }
        .sticker.s2 { top: 14px; right: 24px; color: #9d67db; animation-delay: -0.8s; }
        .sticker.s3 { top: 92px; left: 14px; color: #d66cbf; animation-delay: -1.5s; }
        .sticker.s4 { top: 108px; right: 14px; color: #b35fe1; animation-delay: -2.2s; }
        .sticker.s5 { bottom: 86px; left: 26px; color: #c35bad; animation-delay: -0.4s; }
        .sticker.s6 { bottom: 86px; right: 24px; color: #9f66d9; animation-delay: -1.9s; }

        .float-symbols {
            position: fixed;
            z-index: 0;
            font-size: 1.2rem;
            color: rgba(188, 112, 212, 0.56);
            text-shadow: 0 6px 12px rgba(124, 79, 170, 0.16);
            pointer-events: none;
            user-select: none;
            animation: drift 15s ease-in-out infinite;
        }

        .float-symbols.f1 { top: 88px; left: 110px; }
        .float-symbols.f2 { top: 180px; right: 124px; animation-delay: -4s; }
        .float-symbols.f3 { bottom: 148px; left: 148px; animation-delay: -7s; }
        .float-symbols.f4 { bottom: 96px; right: 178px; animation-delay: -2s; }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes drift {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(14px) translateX(8px); }
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 22px;
                padding: 1rem 1rem 1.4rem;
            }

            .cutesy-ribbon {
                font-size: 0.75rem;
                letter-spacing: 0.16rem;
            }

            .sticker {
                font-size: 1.05rem;
            }

            .float-symbols {
                display: none;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="ring one" aria-hidden="true"></div>
    <div class="ring two" aria-hidden="true"></div>
    <div class="float-symbols f1" aria-hidden="true">✿ ✦</div>
    <div class="float-symbols f2" aria-hidden="true">♡ ☆</div>
    <div class="float-symbols f3" aria-hidden="true">❀ ✧</div>
    <div class="float-symbols f4" aria-hidden="true">➳ ⟡</div>

    <main class="card">
        <span class="sticker s1" aria-hidden="true">✿</span>
        <span class="sticker s2" aria-hidden="true">♡</span>
        <span class="sticker s3" aria-hidden="true">❀</span>
        <span class="sticker s4" aria-hidden="true">➳</span>
        <span class="sticker s5" aria-hidden="true">☆</span>
        <span class="sticker s6" aria-hidden="true">✧</span>
        <div class="symbols">✦ ☆ ✧ ⟡</div>
        <div class="cutesy-ribbon">♡ ❀ ✿ ｡ﾟ☆ cute mode on ☆ﾟ｡ ✿ ❀ ♡</div>
        <h1>Unsaid Thoughts Portal QR</h1>
        <p>Una sa lahat hindi po 'to scam hehe. Scan nyo dali, first website na nadeploy ko so visit nyo hehe. Cutesy to promise!'.</p>

        <div class="qr-wrap">
            <img crossorigin="anonymous" src="https://api.qrserver.com/v1/create-qr-code/?size=1024x1024&format=png&ecc=H&qzone=2&color=8b0058&bgcolor=ffffff&data=https%3A%2F%2Funsaidthoughts.rf.gd%2Fhome.php" alt="QR code for https://unsaidthoughts.rf.gd/home.php">
        </div>

        <div class="url">https://unsaidthoughts.rf.gd/home.php</div>

        <button class="btn" id="downloadCardBtn" type="button">Scan the QR</button>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        (function () {
            var button = document.getElementById('downloadCardBtn');
            var card = document.querySelector('.card');
            var fallbackQrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=1024x1024&format=png&ecc=H&qzone=2&color=8b0058&bgcolor=ffffff&data=https%3A%2F%2Funsaidthoughts.rf.gd%2Fhome.php';

            if (!button || !card) {
                return;
            }

            button.addEventListener('click', function () {
                button.disabled = true;

                try {
                    if (typeof html2canvas !== 'function') {
                        throw new Error('html2canvas unavailable');
                    }

                    html2canvas(card, {
                        backgroundColor: null,
                        scale: 2,
                        useCORS: true,
                        logging: false
                    }).then(function (canvas) {
                        var link = document.createElement('a');
                        link.download = 'unsaidthoughts-qr-card.png';
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    }).catch(function () {
                        var fallbackLink = document.createElement('a');
                        fallbackLink.href = fallbackQrUrl;
                        fallbackLink.download = 'unsaidthoughts-qr.png';
                        fallbackLink.click();
                    }).finally(function () {
                        button.disabled = false;
                        button.textContent = 'Scan the QR';
                    });
                } catch (e) {
                    var fallbackLink = document.createElement('a');
                    fallbackLink.href = fallbackQrUrl;
                    fallbackLink.download = 'unsaidthoughts-qr.png';
                    fallbackLink.click();
                    button.disabled = false;
                    button.textContent = 'Scan the QR';
                }
            });
        })();
    </script>
</body>
</html>
